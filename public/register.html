<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Secure Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="panel auth-card">
        <h1>Create Account</h1>
        <p class="subtitle">Register a new inventory user</p>

        <form id="registerForm" class="stack">
          <input type="text" id="name" placeholder="Name (optional)" />
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password (8+ chars)" required />
          <button type="submit">Register</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Login</a></p>
        <div id="error" class="error hidden"></div>
      </section>
    </main>

    <script type="module" src="/register.js"></script>
  </body>
</html>
